name: Render Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        env:
          KEEP_ALIVE_URL: ${{ secrets.RENDER_KEEP_ALIVE_URL }}
        run: |
          if [ -z "$KEEP_ALIVE_URL" ]; then
            echo "RENDER_KEEP_ALIVE_URL secret is missing"
            exit 1
          fi
          curl --fail --silent --show-error "$KEEP_ALIVE_URL"
